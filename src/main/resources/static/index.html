<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SSE Learning Demo</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background: #f6f7f9;
      color: #1f2937;
    }
    main {
      max-width: 860px;
      margin: 40px auto;
      padding: 0 20px;
    }
    h1 {
      font-size: 28px;
      margin: 0 0 8px;
    }
    .status {
      margin: 18px 0;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      background: #fff;
    }
    .session {
      margin: 0 0 18px;
      font-family: Consolas, monospace;
      color: #4b5563;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 0 0 18px;
    }
    .message-form {
      display: flex;
      gap: 10px;
      margin: 0 0 18px;
    }
    input {
      flex: 1;
      min-width: 220px;
      height: 36px;
      box-sizing: border-box;
      padding: 0 12px;
      border: 1px solid #9ca3af;
      border-radius: 6px;
      background: #fff;
      color: #111827;
    }
    button {
      height: 36px;
      padding: 0 16px;
      border: 1px solid #9ca3af;
      border-radius: 6px;
      background: #fff;
      color: #111827;
      cursor: pointer;
    }
    button:disabled {
      color: #9ca3af;
      cursor: not-allowed;
      background: #f3f4f6;
    }
    #log {
      min-height: 360px;
      padding: 14px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      background: #111827;
      color: #d1fae5;
      overflow: auto;
      white-space: pre-wrap;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main>
    <h1>SSE Learning Demo</h1>
    <div class="status">连接状态：<strong id="status">未连接</strong></div>
    <div class="session">sessionId：<span id="sessionId">无</span></div>
    <div class="toolbar">
      <button id="connectBtn" type="button">连接</button>
      <button id="disconnectBtn" type="button" disabled>断开</button>
      <button id="clearBtn" type="button">清空日志</button>
    </div>
    <div class="message-form">
      <input id="messageInput" type="text" placeholder="输入一条消息，通过 POST 发给服务端" disabled>
      <button id="sendBtn" type="button" disabled>发送消息</button>
    </div>
    <pre id="log"></pre>
  </main>

  <script>
    const statusElement = document.getElementById("status");
    const sessionIdElement = document.getElementById("sessionId");
    const logElement = document.getElementById("log");
    const connectButton = document.getElementById("connectBtn");
    const disconnectButton = document.getElementById("disconnectBtn");
    const clearButton = document.getElementById("clearBtn");
    const messageInput = document.getElementById("messageInput");
    const sendButton = document.getElementById("sendBtn");
    let eventSource = null;
    let sessionId = null;
    let messageEndpoint = null;

    function appendLog(text) {
      logElement.textContent += text + "\n";
      logElement.scrollTop = logElement.scrollHeight;
    }

    function setConnected(connected) {
      connectButton.disabled = connected;
      disconnectButton.disabled = !connected;
      messageInput.disabled = !connected;
      sendButton.disabled = !connected;
    }

    function resetSession() {
      sessionId = null;
      messageEndpoint = null;
      sessionIdElement.textContent = "无";
    }

    function connectSse() {
      if (eventSource) {
        appendLog("[info] 当前已经有 SSE 连接");
        return;
      }

      resetSession();
      statusElement.textContent = "正在连接...";
      appendLog("[connect] 创建 EventSource，开始请求 /events");

      eventSource = new EventSource("/events");

      eventSource.onopen = () => {
        setConnected(true);
        statusElement.textContent = "已连接";
        appendLog("[open] SSE 连接已建立");
      };

      eventSource.addEventListener("session", (event) => {
        const data = JSON.parse(event.data);
        sessionId = data.sessionId;
        messageEndpoint = data.messageEndpoint;
        sessionIdElement.textContent = sessionId;
        appendLog("[session] " + event.data);
      });

      eventSource.addEventListener("message", (event) => {
        appendLog("[message] " + event.data);
      });

      eventSource.onerror = () => {
        statusElement.textContent = "连接异常或正在重连";
        appendLog("[error] 连接异常，浏览器可能会自动尝试重连");
      };
    }

    function disconnectSse() {
      if (!eventSource) {
        appendLog("[info] 当前没有 SSE 连接");
        return;
      }

      eventSource.close();
      eventSource = null;
      resetSession();
      setConnected(false);
      statusElement.textContent = "已断开";
      appendLog("[close] 浏览器主动关闭 SSE 连接");
    }

    async function sendMessage() {
      const text = messageInput.value.trim();
      if (!text) {
        appendLog("[warn] 请输入消息内容");
        return;
      }

      if (!messageEndpoint) {
        appendLog("[warn] 当前还没有 sessionId，不能发送消息");
        return;
      }

      appendLog("[post] POST " + messageEndpoint + " body=" + JSON.stringify({ text }));

      const response = await fetch(messageEndpoint, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ text })
      });

      const result = await response.json();
      appendLog("[post-result] " + JSON.stringify(result));
      messageInput.value = "";
    }

    connectButton.addEventListener("click", connectSse);
    disconnectButton.addEventListener("click", disconnectSse);
    sendButton.addEventListener("click", sendMessage);
    messageInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        sendMessage();
      }
    });
    clearButton.addEventListener("click", () => {
      logElement.textContent = "";
    });
  </script>
</body>
</html>
