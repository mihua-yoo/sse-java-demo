<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SSE Learning Demo</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background: #f6f7f9;
      color: #1f2937;
    }
    main {
      max-width: 860px;
      margin: 40px auto;
      padding: 0 20px;
    }
    h1 {
      font-size: 28px;
      margin: 0 0 8px;
    }
    .status {
      margin: 18px 0;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      background: #fff;
    }
    #log {
      min-height: 360px;
      padding: 14px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      background: #111827;
      color: #d1fae5;
      overflow: auto;
      white-space: pre-wrap;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main>
    <h1>SSE Learning Demo</h1>
    <div class="status">连接状态：<strong id="status">正在连接...</strong></div>
    <pre id="log"></pre>
  </main>

  <script>
    const statusElement = document.getElementById("status");
    const logElement = document.getElementById("log");
    const eventSource = new EventSource("/events");

    function appendLog(text) {
      logElement.textContent += text + "\n";
      logElement.scrollTop = logElement.scrollHeight;
    }

    eventSource.onopen = () => {
      statusElement.textContent = "已连接";
      appendLog("[open] SSE 连接已建立");
    };

    eventSource.addEventListener("message", (event) => {
      appendLog("[message] " + event.data);
    });

    eventSource.onerror = () => {
      statusElement.textContent = "连接异常或正在重连";
      appendLog("[error] 连接异常，浏览器会自动尝试重连");
    };
  </script>
</body>
</html>
